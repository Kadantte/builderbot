name: 🚀 (DEV) Liberando versiones

on:
    push:
        branches:
            - builderbot-dev

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: 22.20.0

jobs:
    ############ TEST ############
    test:
        name: 🧪 Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Tests
              run: pnpm test

    ############ BUILD ############
    build:
        name: 🔨 Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Packages
              run: pnpm run clean.lib && pnpm run build

    ############ RELEASE ############
    release:
        name: 📦 Release Alpha
        runs-on: ubuntu-latest
        needs: [test, build]
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'
                  registry-url: https://registry.npmjs.org/

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Packages
              run: pnpm run clean.lib && pnpm run build

            - name: Release Alpha
              run: npx lerna publish --canary --preid alpha --dist-tag alpha --yes
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
