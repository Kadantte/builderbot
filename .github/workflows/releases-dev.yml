name: 🚀 (DEV) Liberando versiones

on:
    workflow_dispatch:
    pull_request:
        branches:
            - builderbot-dev

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: 22.20.0
    PUPPETEER_SKIP_DOWNLOAD: 'true'
    PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
    PUPPETEER_SKIP_FIREFOX_DOWNLOAD: 'true'
    MONGOMS_DOWNLOAD_DIR: ~/.cache/mongodb-binaries

jobs:
    ############ TEST ############
    test:
        name: 🧪 Tests
        runs-on: ubuntu-latest
        timeout-minutes: 45
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - name: Cache heavy binaries
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/puppeteer
                      ~/.cache/mongodb-binaries
                  key: heavy-binaries-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: heavy-binaries-${{ runner.os }}-

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile --prefer-offline --reporter=append-only

            - name: Run Tests
              run: pnpm test

    ############ BUILD ############
    build:
        name: 🔨 Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - name: Cache heavy binaries
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/puppeteer
                      ~/.cache/mongodb-binaries
                  key: heavy-binaries-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: heavy-binaries-${{ runner.os }}-

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile --prefer-offline --reporter=append-only

            - name: Build Packages
              run: pnpm run clean.lib && pnpm run build

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist-packages
                  path: packages/*/dist
                  retention-days: 1

    ############ RELEASE ############
    release:
        name: 📦 Release Alpha
        runs-on: ubuntu-latest
        needs: [test, build]
        permissions:
            contents: write
            packages: write
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.head_ref || github.ref_name }}

            - uses: pnpm/action-setup@v4

            - name: Cache heavy binaries
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/puppeteer
                      ~/.cache/mongodb-binaries
                  key: heavy-binaries-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: heavy-binaries-${{ runner.os }}-

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'
                  cache-dependency-path: pnpm-lock.yaml
                  registry-url: 'https://registry.npmjs.org'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile --prefer-offline --reporter=append-only

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist-packages
                  path: packages

            - name: Verify npm authentication
              run: npm whoami
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Release Alpha
              run: |
                  # Obtener versión base sin sufijo alpha
                  BASE_VERSION=$(node -p "require('./lerna.json').version.replace(/-alpha.*/, '')")
                  NEW_VERSION="${BASE_VERSION}-alpha.${{ github.run_number }}"
                  echo "📦 Publicando versión: $NEW_VERSION"

                  # Actualizar versión en todos los paquetes
                  npx lerna version $NEW_VERSION --force-publish --yes --no-git-tag-version --no-push

                  # Hacer commit temporal de los cambios de versión (necesario para lerna publish)
                  git add -A
                  git commit -m "chore: bump version to $NEW_VERSION [skip ci]" || true

                  # Publicar al tag alpha
                  npx lerna publish from-package --dist-tag alpha --yes
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: 📋 Log Deployed Version
              run: |
                  echo "=========================================="
                  echo "🚀 VERSIÓN DESPLEGADA (ALPHA)"
                  echo "=========================================="
                  echo "📅 Fecha: $(date)"
                  echo "🔗 Commit: ${{ github.sha }}"
                  echo "👤 Actor: ${{ github.actor }}"
                  echo "------------------------------------------"
                  echo "📦 Paquetes publicados:"
                  npx lerna ls --json | jq -r '.[] | "  - \(.name): \(.version)"'
                  echo "=========================================="
